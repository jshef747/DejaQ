<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DejaQ — OpenAI-Compatible API Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Top bar ── */
    .topbar {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 16px;
      background: #0d1b3e;
      border-bottom: 1px solid #1e3a5f;
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    .topbar-title { font-size: 1rem; font-weight: 700; color: #a78bfa; white-space: nowrap; }
    .topbar-title span { color: #64748b; font-weight: 400; font-size: 0.78rem; margin-left: 6px; }

    .cfg { display: flex; align-items: center; gap: 6px; font-size: 0.78rem; }
    .cfg label { color: #64748b; white-space: nowrap; }
    .cfg input {
      background: #1a1a2e; border: 1px solid #334155; border-radius: 6px;
      color: #e0e0e0; padding: 3px 8px; font-size: 0.78rem; outline: none;
    }
    .cfg input:focus { border-color: #7c3aed; }
    .cfg input.url  { width: 190px; }
    .cfg input.key  { width: 100px; }
    .cfg input.mdl  { width: 90px; }

    .toggle-group { display: flex; align-items: center; gap: 5px; font-size: 0.78rem; color: #64748b; }
    .toggle { position: relative; display: inline-block; width: 32px; height: 18px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; inset: 0; background: #334155;
      border-radius: 18px; cursor: pointer; transition: background 0.2s;
    }
    .slider:before {
      content: ""; position: absolute; width: 12px; height: 12px;
      left: 3px; bottom: 3px; background: white; border-radius: 50%;
      transition: transform 0.2s;
    }
    input:checked + .slider { background: #7c3aed; }
    input:checked + .slider:before { transform: translateX(14px); }

    /* ── Layout ── */
    .layout {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 220px;
      min-width: 220px;
      background: #0a1628;
      border-right: 1px solid #1e3a5f;
      display: flex;
      flex-direction: column;
    }
    .sidebar-header {
      padding: 10px 10px 6px;
      border-bottom: 1px solid #1e3a5f;
      flex-shrink: 0;
    }
    .new-btn {
      width: 100%; padding: 7px 10px;
      background: #7c3aed; border: none; border-radius: 7px;
      color: white; font-size: 0.8rem; font-weight: 600;
      cursor: pointer; transition: background 0.2s;
    }
    .new-btn:hover { background: #6d28d9; }

    .conv-list { flex: 1; overflow-y: auto; padding: 6px 0; }
    .conv-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 10px; cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 0.15s;
      gap: 6px;
    }
    .conv-item:hover { background: #0d1b3e; }
    .conv-item.active { background: #16213e; border-left-color: #7c3aed; }
    .conv-name {
      font-size: 0.8rem; color: #cbd5e1;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      flex: 1;
    }
    .conv-del {
      font-size: 0.75rem; color: #475569; background: none; border: none;
      cursor: pointer; padding: 1px 4px; border-radius: 4px; flex-shrink: 0;
      opacity: 0; transition: opacity 0.15s;
    }
    .conv-item:hover .conv-del { opacity: 1; }
    .conv-del:hover { color: #f87171; }

    /* ── Status bar (per conversation) ── */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      background: #0d1b3e;
      border-bottom: 1px solid #1e3a5f;
      font-size: 0.72rem;
      flex-shrink: 0;
      flex-wrap: wrap;
      min-height: 34px;
    }
    .status-label { color: #475569; }
    .status-val {
      display: flex; align-items: center; gap: 5px;
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .dot.hit  { background: #22c55e; box-shadow: 0 0 5px #22c55e88; }
    .dot.miss { background: #f59e0b; }
    .dot.idle { background: #334155; }

    .badge {
      padding: 1px 7px; border-radius: 20px;
      font-size: 0.68rem; font-weight: 600;
    }
    .badge.cache  { background: #14532d; color: #86efac; }
    .badge.miss   { background: #422006; color: #fbbf24; }
    .badge.model  { background: #1e1b4b; color: #a5b4fc; }
    .badge.lat    { background: #1c1917; color: #94a3b8; }
    .badge.stream { background: #0f2030; color: #38bdf8; }
    .badge.tok    { background: #1c1917; color: #64748b; }

    /* ── Chat pane ── */
    .chat-pane {
      flex: 1; display: flex; flex-direction: column; min-width: 0;
    }
    .chat-area {
      flex: 1; min-height: 0; overflow-y: auto;
      padding: 16px; display: flex; flex-direction: column; gap: 12px;
    }
    .empty-hint {
      margin: auto; text-align: center; color: #334155; font-size: 0.85rem;
    }
    .empty-hint p { margin-top: 6px; font-size: 0.75rem; }

    .msg { display: flex; gap: 10px; max-width: 88%; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.assistant { align-self: flex-start; }

    .avatar {
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; font-weight: 700; flex-shrink: 0; margin-top: 2px;
    }
    .msg.user .avatar     { background: #7c3aed; color: white; }
    .msg.assistant .avatar { background: #0e4d40; color: #4ade80; }

    .bubble {
      padding: 9px 13px; border-radius: 12px;
      font-size: 0.87rem; line-height: 1.55;
      white-space: pre-wrap; word-break: break-word;
    }
    .msg.user .bubble      { background: #4c1d95; color: #ede9fe; border-radius: 12px 2px 12px 12px; }
    .msg.assistant .bubble { background: #1e293b; color: #e2e8f0; border-radius: 2px 12px 12px 12px; }

    .msg-meta { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }

    .cursor {
      display: inline-block; width: 7px; height: 13px;
      background: #7c3aed; border-radius: 2px;
      animation: blink 0.9s infinite; vertical-align: text-bottom; margin-left: 2px;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* ── Input area ── */
    .input-wrap {
      padding: 10px 14px;
      border-top: 1px solid #1e3a5f;
      display: flex; gap: 8px;
      flex-shrink: 0;
    }
    .input-wrap textarea {
      flex: 1; background: #0d1b3e; border: 1px solid #334155;
      border-radius: 10px; color: #e0e0e0; font-size: 0.88rem;
      padding: 9px 13px; resize: none; outline: none; font-family: inherit;
      transition: border-color 0.2s; max-height: 120px;
    }
    .input-wrap textarea:focus { border-color: #7c3aed; }
    .send-btn {
      background: #7c3aed; border: none; border-radius: 10px;
      color: white; font-size: 0.9rem; font-weight: 600;
      padding: 0 18px; cursor: pointer; transition: background 0.2s;
    }
    .send-btn:hover:not(:disabled) { background: #6d28d9; }
    .send-btn:disabled { background: #3b0764; color: #6b21a8; cursor: not-allowed; }

    /* ── Raw inspector ── */
    .raw-wrap {
      border-top: 1px solid #1e3a5f; flex-shrink: 0;
    }
    details { font-size: 0.72rem; }
    summary {
      padding: 5px 14px; cursor: pointer;
      color: #475569; user-select: none; list-style: none;
    }
    summary:hover { color: #94a3b8; }
    #raw-output {
      padding: 8px 14px; font-family: 'Menlo','Fira Code',monospace;
      color: #7dd3fc; white-space: pre-wrap; word-break: break-all;
      max-height: 130px; overflow-y: auto;
      border-top: 1px solid #1e3a5f; background: #060d1a;
    }
  </style>
</head>
<body>

<!-- Top config bar -->
<div class="topbar">
  <div class="topbar-title">DejaQ <span>OpenAI-Compatible Gateway</span></div>
  <div class="cfg"><label>URL</label><input class="url" id="baseUrl" value="http://localhost:8000/v1"></div>
  <div class="cfg"><label>Key</label><input class="key" id="apiKey" value="demo-key"></div>
  <div class="cfg"><label>Model</label><input class="mdl" id="model" value="gpt-4o"></div>
  <div class="toggle-group">
    <label>Stream</label>
    <label class="toggle">
      <input type="checkbox" id="streamToggle" checked>
      <span class="slider"></span>
    </label>
  </div>
</div>

<div class="layout">

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <button class="new-btn" id="newChatBtn">+ New Chat</button>
    </div>
    <div class="conv-list" id="convList"></div>
  </div>

  <!-- Chat pane -->
  <div class="chat-pane">

    <!-- Per-request status bar -->
    <div class="status-bar" id="statusBar">
      <span class="status-label">Last request:</span>
      <span class="status-val"><span class="dot idle" id="statusDot"></span><span id="statusText" style="color:#475569">—</span></span>
    </div>

    <!-- Messages -->
    <div class="chat-area" id="chatArea">
      <div class="empty-hint">
        <div>No messages yet</div>
        <p>Send a message — repeat the same query to see a cache hit.</p>
      </div>
    </div>

    <!-- Input -->
    <div class="input-wrap">
      <textarea id="inputBox" rows="2" placeholder="Type a message… (Enter to send, Shift+Enter for newline)"></textarea>
      <button class="send-btn" id="sendBtn">Send</button>
    </div>

    <!-- Raw inspector -->
    <div class="raw-wrap">
      <details>
        <summary>Raw response inspector</summary>
        <div id="raw-output">Send a message to see the raw API response here.</div>
      </details>
    </div>

  </div>
</div>

<script>
  // ── State ──────────────────────────────────────────────────────────────────

  let chats = [];       // [{ id, name, messages: [{role,content}] }]
  let activeId = null;

  const chatArea   = document.getElementById('chatArea');
  const convList   = document.getElementById('convList');
  const inputBox   = document.getElementById('inputBox');
  const sendBtn    = document.getElementById('sendBtn');
  const rawOutput  = document.getElementById('raw-output');
  const statusDot  = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');

  // ── Chat management ────────────────────────────────────────────────────────

  function createChat(name) {
    const id = Date.now().toString(36) + Math.random().toString(36).slice(2);
    chats.push({ id, name: name || 'New chat', messages: [] });
    renderSidebar();
    switchChat(id);
  }

  function switchChat(id) {
    activeId = id;
    renderSidebar();
    renderMessages();
    resetStatus();
    inputBox.focus();
  }

  function deleteChat(id) {
    chats = chats.filter(c => c.id !== id);
    if (activeId === id) {
      activeId = chats.length ? chats[chats.length - 1].id : null;
      if (!activeId) createChat();
    }
    renderSidebar();
    renderMessages();
  }

  function activeChat() {
    return chats.find(c => c.id === activeId) || null;
  }

  // ── Render sidebar ─────────────────────────────────────────────────────────

  function renderSidebar() {
    convList.innerHTML = '';
    [...chats].reverse().forEach(chat => {
      const item = document.createElement('div');
      item.className = 'conv-item' + (chat.id === activeId ? ' active' : '');

      const name = document.createElement('div');
      name.className = 'conv-name';
      name.textContent = chat.name;

      const del = document.createElement('button');
      del.className = 'conv-del';
      del.textContent = '✕';
      del.title = 'Delete';
      del.onclick = e => { e.stopPropagation(); deleteChat(chat.id); };

      item.appendChild(name);
      item.appendChild(del);
      item.onclick = () => switchChat(chat.id);
      convList.appendChild(item);
    });
  }

  // ── Render messages ────────────────────────────────────────────────────────

  function renderMessages() {
    chatArea.innerHTML = '';
    const chat = activeChat();
    if (!chat || chat.messages.length === 0) {
      chatArea.innerHTML = '<div class="empty-hint"><div>No messages yet</div><p>Send a message — repeat the same query to see a cache hit.</p></div>';
      return;
    }
    chat.messages.forEach(m => {
      if (m.role === 'user') {
        appendUserBubble(m.content);
      } else if (m.role === 'assistant') {
        const b = appendAssistantBubble(m.content);
        if (m.meta) attachMeta(b, m.meta);
      }
    });
  }

  // ── Bubble builders ────────────────────────────────────────────────────────

  function appendUserBubble(content) {
    const wrap = document.createElement('div');
    wrap.className = 'msg user';
    wrap.innerHTML = `<div class="avatar">You</div><div class="bubble">${escHtml(content)}</div>`;
    chatArea.appendChild(wrap);
    chatArea.scrollTop = chatArea.scrollHeight;
    return wrap.querySelector('.bubble');
  }

  function appendAssistantBubble(content) {
    const wrap = document.createElement('div');
    wrap.className = 'msg assistant';
    wrap.innerHTML = `<div class="avatar">AI</div><div class="bubble"></div>`;
    wrap.querySelector('.bubble').textContent = content;
    chatArea.appendChild(wrap);
    chatArea.scrollTop = chatArea.scrollHeight;
    return wrap.querySelector('.bubble');
  }

  function attachMeta(bubble, meta) {
    const row = document.createElement('div');
    row.className = 'msg-meta';

    const isCache = meta.modelUsed === 'cache';
    row.appendChild(mkBadge(isCache ? '⚡ cache hit' : '⬡ cache miss', isCache ? 'cache' : 'miss'));
    row.appendChild(mkBadge('🤖 ' + (isCache ? 'cached' : meta.modelUsed), 'model'));
    if (meta.latencyMs !== null) row.appendChild(mkBadge('⏱ ' + meta.latencyMs + ' ms', 'lat'));
    if (meta.isStream) row.appendChild(mkBadge('≋ streamed', 'stream'));
    if (meta.totalTokens !== null) row.appendChild(mkBadge(meta.totalTokens + ' tok', 'tok'));

    bubble.parentElement.appendChild(row);
  }

  function mkBadge(text, cls) {
    const b = document.createElement('span');
    b.className = 'badge ' + cls;
    b.textContent = text;
    return b;
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Status bar ─────────────────────────────────────────────────────────────

  function setStatus(meta) {
    const isCache = meta.modelUsed === 'cache';
    statusDot.className = 'dot ' + (isCache ? 'hit' : 'miss');

    let parts = [];
    parts.push(isCache ? '⚡ Cache HIT' : '⬡ Cache MISS');
    parts.push('model: ' + (isCache ? 'cache' : meta.modelUsed));
    if (meta.latencyMs !== null) parts.push(meta.latencyMs + ' ms');
    if (meta.isStream) parts.push('streamed');
    if (meta.totalTokens !== null) parts.push(meta.totalTokens + ' tokens');

    statusText.textContent = parts.join('  ·  ');
    statusText.style.color = isCache ? '#86efac' : '#fbbf24';
  }

  function setStatusLoading() {
    statusDot.className = 'dot idle';
    statusText.textContent = 'Waiting…';
    statusText.style.color = '#475569';
  }

  function resetStatus() {
    statusDot.className = 'dot idle';
    statusText.textContent = '—';
    statusText.style.color = '#475569';
  }

  // ── Send ───────────────────────────────────────────────────────────────────

  async function send() {
    const text = inputBox.value.trim();
    if (!text || !activeChat()) return;

    const baseUrl = document.getElementById('baseUrl').value.replace(/\/$/, '');
    const apiKey  = document.getElementById('apiKey').value;
    const model   = document.getElementById('model').value;
    const stream  = document.getElementById('streamToggle').checked;

    const chat = activeChat();

    // Auto-name after first message
    if (chat.messages.length === 0) {
      chat.name = text.slice(0, 32) + (text.length > 32 ? '…' : '');
      renderSidebar();
    }

    inputBox.value = '';
    sendBtn.disabled = true;
    setStatusLoading();

    chat.messages.push({ role: 'user', content: text });
    appendUserBubble(text);

    const aiBubble = appendAssistantBubble('');
    const cursor = document.createElement('span');
    cursor.className = 'cursor';
    aiBubble.appendChild(cursor);

    rawOutput.textContent = '';

    const reqMessages = chat.messages.map(m => ({ role: m.role, content: m.content }));
    const t0 = Date.now();

    try {
      const res = await fetch(`${baseUrl}/chat/completions`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
        body: JSON.stringify({ model, messages: reqMessages, stream }),
      });

      const modelUsed = res.headers.get('x-dejaq-model-used') || '?';
      let fullText = '';
      let usage = null;

      if (stream) {
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop();

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const payload = line.slice(6).trim();
            if (payload === '[DONE]') continue;
            try {
              const chunk = JSON.parse(payload);
              rawOutput.textContent += payload + '\n';
              const delta = chunk.choices?.[0]?.delta?.content;
              if (delta) {
                fullText += delta;
                aiBubble.textContent = fullText;
                aiBubble.appendChild(cursor);
                chatArea.scrollTop = chatArea.scrollHeight;
              }
            } catch (_) {}
          }
        }
        aiBubble.textContent = fullText;
      } else {
        const data = await res.json();
        rawOutput.textContent = JSON.stringify(data, null, 2);
        fullText = data.choices?.[0]?.message?.content ?? '(empty)';
        usage = data.usage;
        aiBubble.textContent = fullText;
      }

      const latencyMs = Date.now() - t0;
      const meta = {
        modelUsed,
        latencyMs,
        isStream: stream,
        totalTokens: usage?.total_tokens ?? null,
      };

      attachMeta(aiBubble, meta);
      setStatus(meta);

      chat.messages.push({ role: 'assistant', content: fullText, meta });

    } catch (err) {
      aiBubble.textContent = `Error: ${err.message}`;
      aiBubble.style.color = '#f87171';
      rawOutput.textContent = String(err);
      resetStatus();
    }

    sendBtn.disabled = false;
    chatArea.scrollTop = chatArea.scrollHeight;
    inputBox.focus();
  }

  // ── Init ───────────────────────────────────────────────────────────────────

  document.getElementById('newChatBtn').addEventListener('click', () => createChat());
  sendBtn.addEventListener('click', send);
  inputBox.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });

  createChat('Chat 1');
</script>
</body>
</html>
